name: Release crates.io Package

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version increment to apply from the latest tag
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: e2ee-backend-adapter-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Compute next release version
        id: version
        run: |
          next_version="$(./scripts/next-version.sh "${{ inputs.bump }}")"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$next_version" >> "$GITHUB_OUTPUT"

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update workspace version
        run: ./scripts/set-version.sh "${{ steps.version.outputs.version }}"

      - name: Validate workspace
        run: cargo test

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: ./scripts/publish-crates.sh

      - name: Commit release version
        run: |
          git add Cargo.toml
          git commit -m "chore: release ${{ steps.version.outputs.tag }}"

      - name: Create git tag
        run: git tag "${{ steps.version.outputs.tag }}"

      - name: Push release commit and tag
        run: |
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "${{ steps.version.outputs.tag }}"