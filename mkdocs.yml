site_name: e2ee-backend-adapter
site_description: Documentation for the e2ee-backend-adapter Rust crate and REST runtime
site_url: https://benedikt-weyer.github.io/e2ee-backend-adapter/
repo_url: https://github.com/benedikt-weyer/e2ee-backend-adapter
repo_name: benedikt-weyer/e2ee-backend-adapter
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: blue
      accent: blue

nav:
  - Overview: index.md
  - User Guide:
      - Getting Started: user/getting-started.md
      - File Lifecycle: user/file-lifecycle.md
      - Schema Manifest: user/schema-manifest.md
      - Database Diff And Migrations: user/database-tooling.md
  - Developer Guide:
      - Architecture: developer/architecture.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
